<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Students - Admin')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Students</h1>
        <div class="d-flex gap-2">
            <a class="btn btn-success" th:href="@{/api/students/export}">⬇ Export Excel</a>
            <a class="btn btn-primary" th:href="@{/admin/students/new}">＋ Add student</a>
        </div>
    </div>

    <div class="alert alert-success" th:if="${message}" th:text="${message}">message</div>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}">error</div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Student #</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Course</th>
                    <th>DOB</th>
                    <th>Year</th>
                    <th>GPA</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="8" class="text-center text-muted py-4">No students yet.</td>
                </tr>
                <tr th:each="s : ${students}">
                    <td th:text="${s.studentNumber}">STU-2025-0001</td>
                    <td th:text="${s.firstName + ' ' + s.lastName}">Name</td>
                    <td th:text="${s.email}">email</td>
                    <td th:text="${s.courseDisplayName}">Course</td>
                    <td th:text="${s.dateOfBirth}">2003-01-01</td>
                    <td th:text="${s.enrollmentYear}">2025</td>
                    <td th:text="${s.gpa}">3.5</td>
                    <td class="text-end text-nowrap">
                        <a class="btn btn-sm btn-outline-primary"
                           th:href="@{/admin/students/{id}/edit(id=${s.id})}">Edit</a>
                        <form class="d-inline" method="post"
                              th:action="@{/admin/students/{id}/delete(id=${s.id})}"
                              onsubmit="return confirm('Delete this student?');">
                            <button class="btn btn-sm btn-outline-danger" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>

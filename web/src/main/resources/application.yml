server:
  port: 8080

spring:
  application:
    name: student-management

  datasource:
    # In-memory by default (zero setup for local dev).
    # On OpenShift, set DB_URL=jdbc:h2:file:/data/students;DB_CLOSE_DELAY=-1 with a PVC at /data
    # so data survives restarts (see openshift/ manifests).
    url: ${DB_URL:jdbc:h2:mem:students;DB_CLOSE_DELAY=-1}
    driver-class-name: org.h2.Driver
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: true        # http://localhost:8080/h2-console

  thymeleaf:
    cache: false           # convenient during dev

  mvc:
    format:
      date: iso            # bind <input type="date"> (yyyy-MM-dd) to LocalDate

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Single admin account; override on OpenShift via env vars.
app:
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD:admin123}

logging:
  level:
    root: INFO
